# Yazi as a terminite pane.
#
# Yazi is a real TUI file manager — it draws via terminal escape
# sequences. terminite hosts it as a `kind = "tty"` module: the
# module's binary is spawned in a PTY, the same render path used
# for shells parses its output, the same input path delivers
# keystrokes back.
#
# Install yazi first:
#   brew install yazi
#
# Then register the module:
#   terminite module add tools/yazi-module
#   terminite module reload
# And pick "Files" from any pane's dropdown.
#
# Same shape applies to any TUI program — helix, nvim, htop, btop,
# lazygit, k9s — just change `binary` + `name`.

name = "Files"
version = "0.1.0"
binary = "/opt/homebrew/bin/yazi"
description = "Yazi file manager — fast TUI navigator with image previews."
kind = "tty"
